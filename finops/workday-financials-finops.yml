description: FOCUS-aligned FinOps stub for Workday Financials. The product is sold as a module of a Workday tenant subscription; per-API-call pricing and a public usage API are not exposed, so meters describe contractual entitlement rather than runtime telemetry.
sources:
  - https://www.workday.com/en-us/enterprise-resource-planning.html
notes: No public pricing or billing API exists. Generic api_request and compute meters from the scaffold have been removed.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Workday, Inc.
serviceCategory: Cloud ERP
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Workday Financials
  ServiceCategory: Cloud ERP
  ProviderName: Workday
  PublisherName: Workday, Inc.
  InvoiceIssuerName: Workday, Inc.
  BillingCurrency: USD
meters:
  - name: financials_module_subscription
    description: Annual Workday Financials module entitlement attached to the tenant subscription.
    unit: month
    aggregation: max
    dimensions:
      - tenant
  - name: financials_workforce_seats
    description: Licensed user count entitled to the Workday Financials module, sized at contract time.
    unit: seat
    aggregation: max
    dimensions:
      - tenant
principles:
  - name: Visibility
    description: Track Workday Financials spend at the contract / module level via signed order forms; complement with Workday Reports and Audit Trails to confirm finance organizations are actively using the licensed module.
  - name: Allocation
    description: Allocate the Workday Financials fee to the CFO organization and any subsidiary entities consuming the general ledger; charge integration build-out back to the source-system owner.
  - name: Optimization
    description: At renewal, retire unused legal entities, retire unused dimensions, and consolidate satellite accounting tools where Workday Financials can absorb the workload.
  - name: Accountability
    description: The Workday Financials owner inside the Office of the CFO signs off on renewals and integration scope; review utilization with Workday Customer Success annually.
maintainers:
