specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Workday Financials
providerId: workday-financials
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Cloud ERP
  - Financial Management
  - Rate Limiting
description: Workday Financials APIs run inside the parent Workday tenant and inherit the tenant's API throughput, integration concurrency, and Studio batching limits. Workday does not publish numeric rate limits on its public marketing site; specifics are in Workday Community / Customer Center documentation behind authentication.
sources:
  - https://www.workday.com/en-us/enterprise-resource-planning.html
notes: No public per-second or per-minute limits documented. Scaffold tier numbers have been removed.
responseCodes: {}
limits:
  - name: Tenant-Inherited Throughput
    scope: tenant
    metric: varies
    limit: governed by the parent Workday tenant; not publicly documented
    notes: Workday Financials web services share the tenant's API capacity envelope; per-tenant transactional and concurrency limits apply.
policies:
  - name: Tenant Inheritance
    description: Workday Financials APIs share the underlying tenant's API quotas; throttling, retries, and integration backoff follow tenant policies.
  - name: Customer Center Documentation
    description: Numeric thresholds for Workday Financials transactions and integration concurrency are published to authenticated Workday customers in Workday Community.
