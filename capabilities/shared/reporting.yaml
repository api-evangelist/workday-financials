naftiko: "1.0.0-alpha1"

info:
  label: "Workday Financials Reporting API"
  description: "API for accessing financial reports, custom report execution, and analytics data extraction from Workday Financials."
  tags:
    - Workday
    - Financials
    - Reporting
    - Analytics
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WORKDAY_FINANCIALS_ACCESS_TOKEN: WORKDAY_FINANCIALS_ACCESS_TOKEN
      WORKDAY_TENANT: WORKDAY_TENANT

capability:
  consumes:
    - type: http
      namespace: financials-reporting
      baseUri: https://{tenant}.workday.com/api/reporting/v38.2
      description: "Workday Financials reporting and analytics API"
      authentication:
        type: bearer
        token: "{{WORKDAY_FINANCIALS_ACCESS_TOKEN}}"
      resources:
        - name: reports
          path: /reports
          description: "Standard report management"
          operations:
            - name: list-reports
              method: GET
              description: "List available reports"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-report
              method: GET
              description: "Get a report definition"
              inputParameters:
                - name: reportId
                  in: path
                  type: string
                  required: true
                  description: "Report identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: execute-report
              method: POST
              description: "Execute a report"
              inputParameters:
                - name: reportId
                  in: path
                  type: string
                  required: true
                  description: "Report identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  parameters: "{{tools.parameters}}"
        - name: custom-reports
          path: /customReports
          description: "Custom report execution"
          operations:
            - name: list-custom-reports
              method: GET
              description: "List custom reports"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: execute-custom-report
              method: POST
              description: "Execute a custom report"
              inputParameters:
                - name: reportId
                  in: path
                  type: string
                  required: true
                  description: "Custom report identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  parameters: "{{tools.parameters}}"

  exposes:
    - type: rest
      port: 8102
      namespace: financials-reporting-rest
      resources:
        - path: /v1/reports
          name: reports
          description: "Report management"
          operations:
            - method: GET
              name: list-reports
              description: "List available reports"
              call: "financials-reporting.list-reports"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: financials-reporting-mcp
      transport: http
      tools:
        - name: list-reports
          description: "List available financial reports"
          hints:
            readOnly: true
            openWorld: true
          call: "financials-reporting.list-reports"
          outputParameters:
            - type: object
              mapping: "$."
        - name: execute-report
          description: "Execute a standard financial report"
          hints:
            readOnly: true
            openWorld: false
          call: "financials-reporting.execute-report"
          with:
            reportId: "tools.reportId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: execute-custom-report
          description: "Execute a custom Workday report"
          hints:
            readOnly: true
            openWorld: false
          call: "financials-reporting.execute-custom-report"
          with:
            reportId: "tools.reportId"
          outputParameters:
            - type: object
              mapping: "$."
