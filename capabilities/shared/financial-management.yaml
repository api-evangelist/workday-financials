naftiko: "1.0.0-alpha1"

info:
  label: "Workday Financials Financial Management API"
  description: "Core API for managing financial transactions, general ledger, accounts payable, accounts receivable, companies, cost centers, and financial reporting in Workday Financials."
  tags:
    - Workday
    - Financials
    - General Ledger
    - Accounting
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      WORKDAY_FINANCIALS_ACCESS_TOKEN: WORKDAY_FINANCIALS_ACCESS_TOKEN
      WORKDAY_TENANT: WORKDAY_TENANT

capability:
  consumes:
    - type: http
      namespace: financials-core
      baseUri: https://{tenant}.workday.com/api/financialManagement/v38.2
      description: "Workday Financials core financial management API"
      authentication:
        type: bearer
        token: "{{WORKDAY_FINANCIALS_ACCESS_TOKEN}}"
      resources:
        - name: ledger-accounts
          path: /ledgerAccounts
          description: "General ledger account management"
          operations:
            - name: list-ledger-accounts
              method: GET
              description: "List ledger accounts"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-ledger-account
              method: GET
              description: "Get a ledger account"
              inputParameters:
                - name: accountId
                  in: path
                  type: string
                  required: true
                  description: "Ledger account identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: journal-entries
          path: /journalEntries
          description: "Journal entry management"
          operations:
            - name: list-journal-entries
              method: GET
              description: "List journal entries"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-journal-entry
              method: POST
              description: "Create a journal entry"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  period: "{{tools.period}}"
                  lines: "{{tools.lines}}"
        - name: supplier-invoices
          path: /supplierInvoices
          description: "Supplier invoice management"
          operations:
            - name: list-supplier-invoices
              method: GET
              description: "List supplier invoices"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-supplier-invoice
              method: GET
              description: "Get a supplier invoice"
              inputParameters:
                - name: invoiceId
                  in: path
                  type: string
                  required: true
                  description: "Invoice identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: customer-invoices
          path: /customerInvoices
          description: "Customer invoice management"
          operations:
            - name: list-customer-invoices
              method: GET
              description: "List customer invoices"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: cost-centers
          path: /costCenters
          description: "Cost center management"
          operations:
            - name: list-cost-centers
              method: GET
              description: "List cost centers"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: companies
          path: /companies
          description: "Company entity management"
          operations:
            - name: list-companies
              method: GET
              description: "List companies"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: financials-core-rest
      resources:
        - path: /v1/ledger-accounts
          name: ledger-accounts
          description: "Ledger account management"
          operations:
            - method: GET
              name: list-ledger-accounts
              description: "List ledger accounts"
              call: "financials-core.list-ledger-accounts"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: financials-core-mcp
      transport: http
      tools:
        - name: list-ledger-accounts
          description: "List general ledger accounts"
          hints:
            readOnly: true
            openWorld: true
          call: "financials-core.list-ledger-accounts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-journal-entries
          description: "List journal entries"
          hints:
            readOnly: true
            openWorld: true
          call: "financials-core.list-journal-entries"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-journal-entry
          description: "Create a journal entry"
          hints:
            readOnly: false
            destructive: false
          call: "financials-core.create-journal-entry"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-supplier-invoices
          description: "List supplier invoices"
          hints:
            readOnly: true
            openWorld: true
          call: "financials-core.list-supplier-invoices"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-cost-centers
          description: "List cost centers"
          hints:
            readOnly: true
            openWorld: true
          call: "financials-core.list-cost-centers"
          outputParameters:
            - type: object
              mapping: "$."
