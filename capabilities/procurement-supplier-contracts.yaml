naftiko: 1.0.0-alpha2
info:
  label: Workday Financials Workday Procurement API — Supplier Contracts
  description: 'Workday Financials Workday Procurement API — Supplier Contracts. 2 operations. Lead operation: Workday Financials
    List supplier contracts. Self-contained Naftiko capability covering one Workday Financials business surface.'
  tags:
  - Workday Financials
  - Supplier Contracts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_FINANCIALS_API_KEY: WORKDAY_FINANCIALS_API_KEY
capability:
  consumes:
  - type: http
    namespace: procurement-supplier-contracts
    baseUri: https://{tenant}.workday.com/api/procurement/v38.2
    description: Workday Financials Workday Procurement API — Supplier Contracts business capability. Self-contained, no shared
      references.
    resources:
    - name: supplierContracts
      path: /supplierContracts
      operations:
      - name: listsuppliercontracts
        method: GET
        description: Workday Financials List supplier contracts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: supplierContracts-id
      path: /supplierContracts/{id}
      operations:
      - name: getsuppliercontract
        method: GET
        description: Workday Financials Get a supplier contract
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_FINANCIALS_API_KEY}}'
  exposes:
  - type: rest
    namespace: procurement-supplier-contracts-rest
    port: 8080
    description: REST adapter for Workday Financials Workday Procurement API — Supplier Contracts. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/suppliercontracts
      name: suppliercontracts
      description: REST surface for supplierContracts.
      operations:
      - method: GET
        name: listsuppliercontracts
        description: Workday Financials List supplier contracts
        call: procurement-supplier-contracts.listsuppliercontracts
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/suppliercontracts/{id}
      name: suppliercontracts-id
      description: REST surface for supplierContracts-id.
      operations:
      - method: GET
        name: getsuppliercontract
        description: Workday Financials Get a supplier contract
        call: procurement-supplier-contracts.getsuppliercontract
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: procurement-supplier-contracts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Financials Workday Procurement API — Supplier Contracts. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: workday-financials-list-supplier-contracts
      description: Workday Financials List supplier contracts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: procurement-supplier-contracts.listsuppliercontracts
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-financials-get-supplier-contract
      description: Workday Financials Get a supplier contract
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: procurement-supplier-contracts.getsuppliercontract
      outputParameters:
      - type: object
        mapping: $.
