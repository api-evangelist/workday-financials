naftiko: 1.0.0-alpha2
info:
  label: Workday Financials Workday Financial Accounting API — Account Reconciliations
  description: 'Workday Financials Workday Financial Accounting API — Account Reconciliations. 2 operations. Lead operation:
    Workday Financials List account reconciliations. Self-contained Naftiko capability covering one Workday Financials business
    surface.'
  tags:
  - Workday Financials
  - Account Reconciliations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_FINANCIALS_API_KEY: WORKDAY_FINANCIALS_API_KEY
capability:
  consumes:
  - type: http
    namespace: financial-accounting-account-reconciliations
    baseUri: https://{tenant}.workday.com/api/financialAccounting/v38.2
    description: Workday Financials Workday Financial Accounting API — Account Reconciliations business capability. Self-contained,
      no shared references.
    resources:
    - name: accountReconciliations
      path: /accountReconciliations
      operations:
      - name: listaccountreconciliations
        method: GET
        description: Workday Financials List account reconciliations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter by reconciliation status
    - name: accountReconciliations-id
      path: /accountReconciliations/{id}
      operations:
      - name: getaccountreconciliation
        method: GET
        description: Workday Financials Get an account reconciliation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_FINANCIALS_API_KEY}}'
  exposes:
  - type: rest
    namespace: financial-accounting-account-reconciliations-rest
    port: 8080
    description: REST adapter for Workday Financials Workday Financial Accounting API — Account Reconciliations. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/accountreconciliations
      name: accountreconciliations
      description: REST surface for accountReconciliations.
      operations:
      - method: GET
        name: listaccountreconciliations
        description: Workday Financials List account reconciliations
        call: financial-accounting-account-reconciliations.listaccountreconciliations
        with:
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/accountreconciliations/{id}
      name: accountreconciliations-id
      description: REST surface for accountReconciliations-id.
      operations:
      - method: GET
        name: getaccountreconciliation
        description: Workday Financials Get an account reconciliation
        call: financial-accounting-account-reconciliations.getaccountreconciliation
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: financial-accounting-account-reconciliations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Financials Workday Financial Accounting API — Account Reconciliations. One tool per
      consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: workday-financials-list-account-reconciliations
      description: Workday Financials List account reconciliations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-accounting-account-reconciliations.listaccountreconciliations
      with:
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-financials-get-account-reconciliation
      description: Workday Financials Get an account reconciliation
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-accounting-account-reconciliations.getaccountreconciliation
      outputParameters:
      - type: object
        mapping: $.
