naftiko: 1.0.0-alpha2
info:
  label: Workday Financials Workday Financial Management API — Accounts Receivable
  description: 'Workday Financials Workday Financial Management API — Accounts Receivable. 2 operations. Lead operation: Workday
    Financials List customer invoices. Self-contained Naftiko capability covering one Workday Financials business surface.'
  tags:
  - Workday Financials
  - Accounts Receivable
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_FINANCIALS_API_KEY: WORKDAY_FINANCIALS_API_KEY
capability:
  consumes:
  - type: http
    namespace: financial-management-accounts-receivable
    baseUri: https://{tenant}.workday.com/api/financialManagement/v38.2
    description: Workday Financials Workday Financial Management API — Accounts Receivable business capability. Self-contained,
      no shared references.
    resources:
    - name: customerInvoices
      path: /customerInvoices
      operations:
      - name: listcustomerinvoices
        method: GET
        description: Workday Financials List customer invoices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter invoices by status
    - name: customerInvoices-id
      path: /customerInvoices/{id}
      operations:
      - name: getcustomerinvoice
        method: GET
        description: Workday Financials Get a customer invoice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_FINANCIALS_API_KEY}}'
  exposes:
  - type: rest
    namespace: financial-management-accounts-receivable-rest
    port: 8080
    description: REST adapter for Workday Financials Workday Financial Management API — Accounts Receivable. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/customerinvoices
      name: customerinvoices
      description: REST surface for customerInvoices.
      operations:
      - method: GET
        name: listcustomerinvoices
        description: Workday Financials List customer invoices
        call: financial-management-accounts-receivable.listcustomerinvoices
        with:
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/customerinvoices/{id}
      name: customerinvoices-id
      description: REST surface for customerInvoices-id.
      operations:
      - method: GET
        name: getcustomerinvoice
        description: Workday Financials Get a customer invoice
        call: financial-management-accounts-receivable.getcustomerinvoice
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: financial-management-accounts-receivable-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Financials Workday Financial Management API — Accounts Receivable. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: workday-financials-list-customer-invoices
      description: Workday Financials List customer invoices
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-management-accounts-receivable.listcustomerinvoices
      with:
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-financials-get-customer-invoice
      description: Workday Financials Get a customer invoice
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-management-accounts-receivable.getcustomerinvoice
      outputParameters:
      - type: object
        mapping: $.
