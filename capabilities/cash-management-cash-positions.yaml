naftiko: 1.0.0-alpha2
info:
  label: Workday Financials Workday Cash Management API — Cash Positions
  description: 'Workday Financials Workday Cash Management API — Cash Positions. 2 operations. Lead operation: Workday Financials
    List cash positions. Self-contained Naftiko capability covering one Workday Financials business surface.'
  tags:
  - Workday Financials
  - Cash Positions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_FINANCIALS_API_KEY: WORKDAY_FINANCIALS_API_KEY
capability:
  consumes:
  - type: http
    namespace: cash-management-cash-positions
    baseUri: https://{tenant}.workday.com/api/cashManagement/v38.2
    description: Workday Financials Workday Cash Management API — Cash Positions business capability. Self-contained, no shared
      references.
    resources:
    - name: cashPositions
      path: /cashPositions
      operations:
      - name: listcashpositions
        method: GET
        description: Workday Financials List cash positions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: asOfDate
          in: query
          type: string
          description: Cash position as of this date
    - name: cashPositions-id
      path: /cashPositions/{id}
      operations:
      - name: getcashposition
        method: GET
        description: Workday Financials Get a cash position
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_FINANCIALS_API_KEY}}'
  exposes:
  - type: rest
    namespace: cash-management-cash-positions-rest
    port: 8080
    description: REST adapter for Workday Financials Workday Cash Management API — Cash Positions. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/cashpositions
      name: cashpositions
      description: REST surface for cashPositions.
      operations:
      - method: GET
        name: listcashpositions
        description: Workday Financials List cash positions
        call: cash-management-cash-positions.listcashpositions
        with:
          asOfDate: rest.asOfDate
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cashpositions/{id}
      name: cashpositions-id
      description: REST surface for cashPositions-id.
      operations:
      - method: GET
        name: getcashposition
        description: Workday Financials Get a cash position
        call: cash-management-cash-positions.getcashposition
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cash-management-cash-positions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Financials Workday Cash Management API — Cash Positions. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: workday-financials-list-cash-positions
      description: Workday Financials List cash positions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cash-management-cash-positions.listcashpositions
      with:
        asOfDate: tools.asOfDate
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-financials-get-cash-position
      description: Workday Financials Get a cash position
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cash-management-cash-positions.getcashposition
      outputParameters:
      - type: object
        mapping: $.
