      path: /purchaseRequisitions
      operations:
      - name: listpurchaserequisitions
        method: GET
        description: Workday Financials List purchase requisitions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter by requisition status
      - name: createpurchaserequisition
        method: POST
        description: Workday Financials Create a purchase requisition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: purchaseRequisitions-id
      path: /purchaseRequisitions/{id}
      operations:
      - name: getpurchaserequisition
