        name: listpurchaserequisitions
        description: Workday Financials List purchase requisitions
        call: procurement-purchase-requisitions.listpurchaserequisitions
        with:
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createpurchaserequisition
        description: Workday Financials Create a purchase requisition
        call: procurement-purchase-requisitions.createpurchaserequisition
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/purchaserequisitions/{id}
      name: purchaserequisitions-id
      description: REST surface for purchaseRequisitions-id.
