naftiko: 1.0.0-alpha2
info:
  label: Workday Financials Workday Procurement API — Receipts
  description: 'Workday Financials Workday Procurement API — Receipts. 1 operations. Lead operation: Workday Financials List
    goods receipts. Self-contained Naftiko capability covering one Workday Financials business surface.'
  tags:
  - Workday Financials
  - Receipts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_FINANCIALS_API_KEY: WORKDAY_FINANCIALS_API_KEY
capability:
  consumes:
  - type: http
    namespace: procurement-receipts
    baseUri: https://{tenant}.workday.com/api/procurement/v38.2
    description: Workday Financials Workday Procurement API — Receipts business capability. Self-contained, no shared references.
    resources:
    - name: goodsReceipts
      path: /goodsReceipts
      operations:
      - name: listgoodsreceipts
        method: GET
        description: Workday Financials List goods receipts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_FINANCIALS_API_KEY}}'
  exposes:
  - type: rest
    namespace: procurement-receipts-rest
    port: 8080
    description: REST adapter for Workday Financials Workday Procurement API — Receipts. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/goodsreceipts
      name: goodsreceipts
      description: REST surface for goodsReceipts.
      operations:
      - method: GET
        name: listgoodsreceipts
        description: Workday Financials List goods receipts
        call: procurement-receipts.listgoodsreceipts
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: procurement-receipts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Financials Workday Procurement API — Receipts. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: workday-financials-list-goods-receipts
      description: Workday Financials List goods receipts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: procurement-receipts.listgoodsreceipts
      outputParameters:
      - type: object
        mapping: $.
