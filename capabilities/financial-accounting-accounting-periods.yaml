    resources:
    - name: accountingPeriods
      path: /accountingPeriods
      operations:
      - name: listaccountingperiods
        method: GET
        description: Workday Financials List accounting periods
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
