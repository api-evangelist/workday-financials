naftiko: 1.0.0-alpha2
info:
  label: Workday Financials Workday Revenue Management API — Revenue Recognition
  description: 'Workday Financials Workday Revenue Management API — Revenue Recognition. 1 operations. Lead operation: Workday
    Financials List revenue recognition events. Self-contained Naftiko capability covering one Workday Financials business
    surface.'
  tags:
  - Workday Financials
  - Revenue Recognition
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_FINANCIALS_API_KEY: WORKDAY_FINANCIALS_API_KEY
capability:
  consumes:
  - type: http
    namespace: revenue-management-revenue-recognition
    baseUri: https://{tenant}.workday.com/api/revenueManagement/v38.2
    description: Workday Financials Workday Revenue Management API — Revenue Recognition business capability. Self-contained,
      no shared references.
    resources:
    - name: revenueRecognitionEvents
      path: /revenueRecognitionEvents
      operations:
      - name: listrevenuerecognitionevents
        method: GET
        description: Workday Financials List revenue recognition events
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fromDate
          in: query
          type: string
          description: Filter events from this date
        - name: toDate
          in: query
          type: string
          description: Filter events to this date
    authentication:
      type: bearer
      token: '{{env.WORKDAY_FINANCIALS_API_KEY}}'
  exposes:
  - type: rest
    namespace: revenue-management-revenue-recognition-rest
    port: 8080
    description: REST adapter for Workday Financials Workday Revenue Management API — Revenue Recognition. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/revenuerecognitionevents
      name: revenuerecognitionevents
      description: REST surface for revenueRecognitionEvents.
      operations:
      - method: GET
        name: listrevenuerecognitionevents
        description: Workday Financials List revenue recognition events
        call: revenue-management-revenue-recognition.listrevenuerecognitionevents
        with:
          fromDate: rest.fromDate
          toDate: rest.toDate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: revenue-management-revenue-recognition-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Financials Workday Revenue Management API — Revenue Recognition. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: workday-financials-list-revenue-recognition
      description: Workday Financials List revenue recognition events
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: revenue-management-revenue-recognition.listrevenuerecognitionevents
      with:
        fromDate: tools.fromDate
        toDate: tools.toDate
      outputParameters:
      - type: object
        mapping: $.
