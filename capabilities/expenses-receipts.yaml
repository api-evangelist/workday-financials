naftiko: 1.0.0-alpha2
info:
  label: Workday Financials Workday Expenses API — Receipts
  description: 'Workday Financials Workday Expenses API — Receipts. 3 operations. Lead operation: Workday Financials Upload
    a receipt. Self-contained Naftiko capability covering one Workday Financials business surface.'
  tags:
  - Workday Financials
  - Receipts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_FINANCIALS_API_KEY: WORKDAY_FINANCIALS_API_KEY
capability:
  consumes:
  - type: http
    namespace: expenses-receipts
    baseUri: https://{tenant}.workday.com/api/expenses/v38.2
    description: Workday Financials Workday Expenses API — Receipts business capability. Self-contained, no shared references.
    resources:
    - name: receipts
      path: /receipts
      operations:
      - name: uploadreceipt
        method: POST
        description: Workday Financials Upload a receipt
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: receipts-id
      path: /receipts/{id}
      operations:
      - name: getreceipt
        method: GET
        description: Workday Financials Get a receipt
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletereceipt
        method: DELETE
        description: Workday Financials Delete a receipt
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WORKDAY_FINANCIALS_API_KEY}}'
  exposes:
  - type: rest
    namespace: expenses-receipts-rest
    port: 8080
    description: REST adapter for Workday Financials Workday Expenses API — Receipts. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/receipts
      name: receipts
      description: REST surface for receipts.
      operations:
      - method: POST
        name: uploadreceipt
        description: Workday Financials Upload a receipt
        call: expenses-receipts.uploadreceipt
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/receipts/{id}
      name: receipts-id
      description: REST surface for receipts-id.
      operations:
      - method: GET
        name: getreceipt
        description: Workday Financials Get a receipt
        call: expenses-receipts.getreceipt
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletereceipt
        description: Workday Financials Delete a receipt
        call: expenses-receipts.deletereceipt
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: expenses-receipts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Financials Workday Expenses API — Receipts. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: workday-financials-upload-receipt
      description: Workday Financials Upload a receipt
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: expenses-receipts.uploadreceipt
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-financials-get-receipt
      description: Workday Financials Get a receipt
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: expenses-receipts.getreceipt
      outputParameters:
      - type: object
        mapping: $.
    - name: workday-financials-delete-receipt
      description: Workday Financials Delete a receipt
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: expenses-receipts.deletereceipt
      outputParameters:
      - type: object
        mapping: $.
