naftiko: 1.0.0-alpha2
info:
  label: Workday Financials Workday Financial Accounting API — Audit Logs
  description: 'Workday Financials Workday Financial Accounting API — Audit Logs. 1 operations. Lead operation: Workday Financials
    List audit logs. Self-contained Naftiko capability covering one Workday Financials business surface.'
  tags:
  - Workday Financials
  - Audit Logs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WORKDAY_FINANCIALS_API_KEY: WORKDAY_FINANCIALS_API_KEY
capability:
  consumes:
  - type: http
    namespace: financial-accounting-audit-logs
    baseUri: https://{tenant}.workday.com/api/financialAccounting/v38.2
    description: Workday Financials Workday Financial Accounting API — Audit Logs business capability. Self-contained, no
      shared references.
    resources:
    - name: auditLogs
      path: /auditLogs
      operations:
      - name: listauditlogs
        method: GET
        description: Workday Financials List audit logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fromDate
          in: query
          type: string
          description: Filter logs from this date
        - name: toDate
          in: query
          type: string
          description: Filter logs to this date
        - name: eventType
          in: query
          type: string
          description: Filter by event type
    authentication:
      type: bearer
      token: '{{env.WORKDAY_FINANCIALS_API_KEY}}'
  exposes:
  - type: rest
    namespace: financial-accounting-audit-logs-rest
    port: 8080
    description: REST adapter for Workday Financials Workday Financial Accounting API — Audit Logs. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/auditlogs
      name: auditlogs
      description: REST surface for auditLogs.
      operations:
      - method: GET
        name: listauditlogs
        description: Workday Financials List audit logs
        call: financial-accounting-audit-logs.listauditlogs
        with:
          fromDate: rest.fromDate
          toDate: rest.toDate
          eventType: rest.eventType
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: financial-accounting-audit-logs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Workday Financials Workday Financial Accounting API — Audit Logs. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: workday-financials-list-audit-logs
      description: Workday Financials List audit logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: financial-accounting-audit-logs.listauditlogs
      with:
        fromDate: tools.fromDate
        toDate: tools.toDate
        eventType: tools.eventType
      outputParameters:
      - type: object
        mapping: $.
