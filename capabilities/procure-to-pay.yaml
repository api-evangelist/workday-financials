naftiko: 1.0.0-alpha2
info:
  label: Workday Financials Procure To Pay
  description: Unified capability for the procure-to-pay process combining supplier management, purchase requisitions, purchase
    orders, goods receipts, and supplier invoice processing.
  tags:
  - Workday
  - Financials
  - Procurement
  - Procure To Pay
  - Accounts Payable
  - Suppliers
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    WORKDAY_FINANCIALS_ACCESS_TOKEN: WORKDAY_FINANCIALS_ACCESS_TOKEN
    WORKDAY_TENANT: WORKDAY_TENANT
capability:
  consumes:
  - type: http
    namespace: financials-procurement
    baseUri: https://{tenant}.workday.com/api/procurement/v38.2
    description: Workday Financials procurement API
    authentication:
      type: bearer
      token: '{{WORKDAY_FINANCIALS_ACCESS_TOKEN}}'
    resources:
    - name: suppliers
      path: /suppliers
      description: Supplier management
      operations:
      - name: list-suppliers
        method: GET
        description: List suppliers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-supplier
        method: GET
        description: Get a supplier
        inputParameters:
        - name: supplierId
          in: path
          type: string
          required: true
          description: Supplier identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: purchase-orders
      path: /purchaseOrders
      description: Purchase order management
      operations:
      - name: list-purchase-orders
        method: GET
        description: List purchase orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-purchase-order
        method: GET
        description: Get a purchase order
        inputParameters:
        - name: poId
          in: path
          type: string
          required: true
          description: Purchase order identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: requisitions
      path: /purchaseRequisitions
      description: Purchase requisition management
      operations:
      - name: list-purchase-requisitions
        method: GET
        description: List purchase requisitions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-purchase-requisition
        method: POST
        description: Create a purchase requisition
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            description: '{{tools.description}}'
            lines: '{{tools.lines}}'
  - type: http
    namespace: financials-core
    baseUri: https://{tenant}.workday.com/api/financialManagement/v38.2
    description: Workday Financials core financial management API
    authentication:
      type: bearer
      token: '{{WORKDAY_FINANCIALS_ACCESS_TOKEN}}'
    resources:
    - name: ledger-accounts
      path: /ledgerAccounts
      description: General ledger account management
      operations:
      - name: list-ledger-accounts
        method: GET
        description: List ledger accounts
        inputParameters:
        - name: limit
          in: query
          type: integer
          required: false
          description: Maximum results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-ledger-account
        method: GET
        description: Get a ledger account
        inputParameters:
        - name: accountId
          in: path
          type: string
          required: true
          description: Ledger account identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: journal-entries
      path: /journalEntries
      description: Journal entry management
      operations:
      - name: list-journal-entries
        method: GET
        description: List journal entries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-journal-entry
        method: POST
        description: Create a journal entry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            period: '{{tools.period}}'
            lines: '{{tools.lines}}'
    - name: supplier-invoices
      path: /supplierInvoices
      description: Supplier invoice management
      operations:
      - name: list-supplier-invoices
        method: GET
        description: List supplier invoices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-supplier-invoice
        method: GET
        description: Get a supplier invoice
        inputParameters:
        - name: invoiceId
          in: path
          type: string
          required: true
          description: Invoice identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: customer-invoices
      path: /customerInvoices
      description: Customer invoice management
      operations:
      - name: list-customer-invoices
        method: GET
        description: List customer invoices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cost-centers
      path: /costCenters
      description: Cost center management
      operations:
      - name: list-cost-centers
        method: GET
        description: List cost centers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: companies
      path: /companies
      description: Company entity management
      operations:
      - name: list-companies
        method: GET
        description: List companies
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8081
    namespace: workday-financials-p2p-api
    description: Unified REST API for Workday Financials procure-to-pay process.
    resources:
    - path: /v1/suppliers
      name: suppliers
      description: Supplier account management
      operations:
      - method: GET
        name: list-suppliers
        description: List suppliers
        call: financials-procurement.list-suppliers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/purchase-requisitions
      name: purchase-requisitions
      description: Purchase requisition management
      operations:
      - method: GET
        name: list-purchase-requisitions
        description: List purchase requisitions
        call: financials-procurement.list-purchase-requisitions
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-purchase-requisition
        description: Create a purchase requisition
        call: financials-procurement.create-purchase-requisition
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/purchase-orders
      name: purchase-orders
      description: Purchase order management
      operations:
      - method: GET
        name: list-purchase-orders
        description: List purchase orders
        call: financials-procurement.list-purchase-orders
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/supplier-invoices
      name: supplier-invoices
      description: Supplier invoice processing
      operations:
      - method: GET
        name: list-supplier-invoices
        description: List supplier invoices
        call: financials-core.list-supplier-invoices
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9091
    namespace: workday-financials-p2p-mcp
    transport: http
    description: MCP server for AI-assisted Workday Financials procure-to-pay process.
    tools:
    - name: list-suppliers
      description: List supplier accounts in Workday Financials
      hints:
        readOnly: true
        openWorld: true
      call: financials-procurement.list-suppliers
      outputParameters:
      - type: object
        mapping: $.
    - name: get-supplier
      description: Get details of a specific supplier
      hints:
        readOnly: true
        openWorld: true
      call: financials-procurement.get-supplier
      with:
        supplierId: tools.supplierId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-purchase-requisitions
      description: List purchase requisitions
      hints:
        readOnly: true
        openWorld: true
      call: financials-procurement.list-purchase-requisitions
      outputParameters:
      - type: object
        mapping: $.
    - name: create-purchase-requisition
      description: Create a new purchase requisition
      hints:
        readOnly: false
        destructive: false
      call: financials-procurement.create-purchase-requisition
      outputParameters:
      - type: object
        mapping: $.
    - name: list-purchase-orders
      description: List purchase orders
      hints:
        readOnly: true
        openWorld: true
      call: financials-procurement.list-purchase-orders
      outputParameters:
      - type: object
        mapping: $.
    - name: get-purchase-order
      description: Get details of a specific purchase order
      hints:
        readOnly: true
        openWorld: true
      call: financials-procurement.get-purchase-order
      with:
        poId: tools.poId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-supplier-invoices
      description: List supplier invoices for payment processing
      hints:
        readOnly: true
        openWorld: true
      call: financials-core.list-supplier-invoices
      outputParameters:
      - type: object
        mapping: $.
